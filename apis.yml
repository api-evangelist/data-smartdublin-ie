aid: data-smartdublin-ie
name: Smart Dublin Open Data
description: >-
  Smart Dublin Open Data is a municipal government open-data portal for Ireland running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 929 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.

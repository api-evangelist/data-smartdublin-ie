apis:
  - aid: data-smartdublin-ie:catalog
    name: Smart Dublin Open Data CKAN Action API
    description: >-
      CKAN Action API for Smart Dublin Open Data, a consistent JSON-over-HTTP interface over a catalog of 929 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://data.smartdublin.ie/api/3/action/.
    humanURL: https://data.smartdublin.ie
